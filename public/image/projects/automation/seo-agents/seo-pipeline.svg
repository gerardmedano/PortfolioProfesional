<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="1200" height="640" fill="#0f172a"/>

  <text x="600" y="60" text-anchor="middle" fill="#f8fafc" font-size="30" font-weight="700">Generador de Blog con Agentes de IA</text>
  <text x="600" y="92" text-anchor="middle" fill="#94a3b8" font-size="16">Google Apps Script + API de Gemini · 5 artículos/semana (3 inmobiliario + 2 lifestyle)</text>

  <!-- Step 0 -->
  <g>
    <rect x="60" y="150" width="230" height="140" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="175" y="185" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="700">TAXONOMÍA</text>
    <text x="175" y="210" text-anchor="middle" fill="#e2e8f0" font-size="13">Rotación inteligente de</text>
    <text x="175" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13">tema / zona / formato</text>
    <text x="175" y="246" text-anchor="middle" fill="#e2e8f0" font-size="13">según lo menos usado</text>
    <text x="175" y="264" text-anchor="middle" fill="#94a3b8" font-size="12">+ control de estacionalidad</text>
  </g>

  <!-- Arrow -->
  <path d="M290 220 L345 220" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Agent 1 -->
  <g>
    <rect x="350" y="150" width="230" height="140" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="465" y="185" text-anchor="middle" fill="#a3e635" font-size="15" font-weight="700">1. SEO STRATEGIST</text>
    <text x="465" y="210" text-anchor="middle" fill="#e2e8f0" font-size="13">Genera el briefing</text>
    <text x="465" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13">editorial a partir de</text>
    <text x="465" y="246" text-anchor="middle" fill="#e2e8f0" font-size="13">la keyword asignada</text>
  </g>

  <path d="M580 220 L635 220" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Agent 2 -->
  <g>
    <rect x="640" y="150" width="230" height="140" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="755" y="185" text-anchor="middle" fill="#facc15" font-size="15" font-weight="700">2. RESEARCH EDITOR</text>
    <text x="755" y="210" text-anchor="middle" fill="#e2e8f0" font-size="13">Investiga con Google</text>
    <text x="755" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13">Search grounding y</text>
    <text x="755" y="246" text-anchor="middle" fill="#e2e8f0" font-size="13">valida el JSON generado</text>
  </g>

  <path d="M870 220 L925 220" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Agent 3 -->
  <g>
    <rect x="930" y="150" width="230" height="140" rx="16" fill="#1e293b" stroke="#334155"/>
    <text x="1045" y="185" text-anchor="middle" fill="#fb7185" font-size="15" font-weight="700">3. EDITORIAL WRITER</text>
    <text x="1045" y="210" text-anchor="middle" fill="#e2e8f0" font-size="13">Redacta el artículo final</text>
    <text x="1045" y="228" text-anchor="middle" fill="#e2e8f0" font-size="13">combinando briefing +</text>
    <text x="1045" y="246" text-anchor="middle" fill="#e2e8f0" font-size="13">investigación</text>
  </g>

  <!-- bottom flow -->
  <path d="M1045 290 L1045 340 L175 340 L175 380" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <g>
    <rect x="60" y="390" width="1100" height="120" rx="16" fill="#111827" stroke="#334155"/>
    <text x="90" y="425" fill="#38bdf8" font-size="15" font-weight="700">FLUJO DE APROBACIÓN Y ARCHIVO</text>
    <text x="90" y="452" fill="#e2e8f0" font-size="13">Ideas generadas → revisión humana en Sheet ("Aprobado") → briefing + investigación + artículo se archivan</text>
    <text x="90" y="474" fill="#e2e8f0" font-size="13">automáticamente en Drive, listos para publicar. Reintentos automáticos ante errores 429 o respuestas vacías de la API.</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#64748b" font-size="13">2 semanas en producción · 3 posts inmobiliario + 2 lifestyle por semana · contenido consciente de fecha, historial y singularidades territoriales</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
